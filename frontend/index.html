<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#F7F6F3" />
    <meta name="description" content="Hustle - Daily routine, tasks and goals in one place" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hustle" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Hustle" />
    <meta property="og:description" content="Daily routine, tasks and goals in one place" />
    <meta property="og:type" content="website" />

    <title>Hustle</title>
    <style>
      body {
        background: #F7F6F3;
        margin: 0;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
